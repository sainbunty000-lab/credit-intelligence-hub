name: Daily Tender Scraper

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: tender-job
  cancel-in-progress: true

jobs:
  scrape:
    name: Run Tender Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # Python Setup
      # ----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ----------------------------
      # Cache pip
      # ----------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # ----------------------------
      # Install Dependencies (FIXED)
      # ----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------
      # Install Playwright Browser (SAFE)
      # ----------------------------
      - name: Install Chromium
        run: |
          python -m playwright install chromium

      # ----------------------------
      # Verify Playwright (DEBUG)
      # ----------------------------
      - name: Verify Playwright
        run: |
          python -m playwright --version

      # ----------------------------
      # Authenticate (WIF)
      # ----------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/915306901665/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: lead-bot@my-project-47986-leads.iam.gserviceaccount.com

      # ----------------------------
      # Run Scraper (with retry)
      # ----------------------------
      - name: Run Tender Job
        env:
          JOB_TYPE: tender
          SHEET_NAME: Lead_Tracker
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            python -m src.main && break || sleep 10
          done
